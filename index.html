<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Primary meta -->
  <title>Your Name — Portfolio</title>
  <meta name="description" content="Personal portfolio of Your Name — engineer, builder, problem solver.">
  <meta name="author" content="Your Name">

  <!-- Open Graph -->
  <meta property="og:title"       content="Your Name — Portfolio">
  <meta property="og:description" content="Personal portfolio of Your Name — engineer, builder, problem solver.">
  <meta property="og:type"        content="website">
  <meta property="og:url"         content="https://your-username.github.io/your-repo/">
  <meta property="og:image"       content="https://your-username.github.io/your-repo/assets/profile.jpg">

  <!-- Twitter Card -->
  <meta name="twitter:card"        content="summary_large_image">
  <meta name="twitter:title"       content="Your Name — Portfolio">
  <meta name="twitter:description" content="Personal portfolio of Your Name.">

  <!--
    ALL local hrefs use ./ prefix.
    This makes paths relative to the file, so the site works at any
    sub-path (e.g. /site-blueprint/) without any config changes.
  -->
  <link rel="icon" type="image/svg+xml" href="./tahlogo.svg">
  <link rel="icon" type="image/png"     href="./assets/favicon-96x96.png" sizes="96x96">
  <link rel="apple-touch-icon"          href="./assets/apple-icon-precomposed.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link rel="stylesheet" href="./styles/tokens.css">
  <link rel="stylesheet" href="./styles/base.css">
  <link rel="stylesheet" href="./styles/components.css">
</head>
<body>

  <div id="app" class="app"></div>

  <!-- Config must load first — defines SITE_CONFIG used by main.js -->
  <script src="./config/site.config.js"></script>
  <script src="./scripts/main.js"></script>

</body>
</html>
